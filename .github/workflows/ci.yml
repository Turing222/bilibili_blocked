name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  deterministic-smoke:
    name: Deterministic smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Lint
        run: npm run lint

      - name: Check
        run: npm run check

      - name: Deterministic smoke
        run: npm run ci:deterministic-smoke
